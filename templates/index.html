<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multilingual Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="chat-header">
            <h1>🤖 Multilingual Chatbot</h1>
            <div class="header-controls">
                <select id="languageSelect" class="language-select">
                    <!-- Languages will be loaded dynamically -->
                </select>
                <div class="status-indicator">
                    <span id="statusDot" class="status-dot offline"></span>
                    <span id="statusText">Checking connection...</span>
                </div>
            </div>
        </div>
        
        <div class="chat-container">
            <div id="chatMessages" class="chat-messages">
                <div class="welcome-message">
                    <div class="message system">
                        <div class="message-content" id="welcomeMessage">
                            Loading...
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="chat-input-container">
                <textarea id="messageInput" class="message-input" placeholder="Type your message here..." rows="3"></textarea>
                <button id="sendButton" class="send-button">Send</button>
            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
